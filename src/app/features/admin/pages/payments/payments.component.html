<section class="container">
  <div class="title">
    <!-- <div class="items">
      <h2>Pagamentos</h2>
      <p>Controle financeiro dos serviços realizados</p>
    </div> -->

    <button class="btn-primary">
      <span class="material-symbols-outlined">add</span> Novo Pagamento
    </button>
  </div>

  <div class="filters">
    <input type="text" placeholder="Buscar cliente..." />

    <select>
      <option>Forma de pagamento</option>
      <option>PIX</option>
      <option>Cartão</option>
      <option>Dinheiro</option>
    </select>

    <select>
      <option>Status</option>
      <option>Pago</option>
      <option>Pendente</option>
    </select>

    <button class="btn-secondary"><p>Limpar filtros</p></button>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-items">
        <span class="material-symbols-outlined"> database </span>
        <h1>Receita Total</h1>
      </div>
      <p>R$ 2.450</p>
    </div>

    <div class="card">
      <div class="card-items">
        <span class="material-symbols-outlined"> calendar_month </span>
        <h1>Pagamentos Hoje</h1>
      </div>
      <p>R$ 180</p>
    </div>

    <div class="card">
      <div class="card-items">
        <span class="material-symbols-outlined"> history </span>
        <h1>Pendentes</h1>
      </div>
      <p>R$ 90</p>
    </div>
  </div>

  <app-admin-user-table
    [data]="payments"
    [columns]="paymentsColumns"
    (edit)="handleEdit($event)"
    (delete)="handleDelete($event)"
  >
  </app-admin-user-table>
</section>
